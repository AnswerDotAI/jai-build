name: release-portable-linux-amd64

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portable-linux-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake binutils g++-14 pandoc

      - name: Clone jai source
        run: git clone --depth 1 https://github.com/stanford-scs/jai.git jai-src

      - name: Show build environment
        run: |
          uname -a
          ldd --version | head -1
          g++-14 --version | head -1

      - name: Build portable tarball
        env:
          JAI_RELEASE_TAG: ${{ github.ref_name }}
        run: ./build.sh jai-src

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jai-portable-linux-amd64
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --title "$tag" --generate-notes
          fi
