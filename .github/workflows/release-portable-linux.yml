name: release-portable-linux

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: portable-linux-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.asset_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            asset_arch: amd64
          - runner: ubuntu-24.04-arm
            asset_arch: arm64
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Show release metadata
        run: python tools/version.py show

      - name: Verify release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          expected_tag="$(python tools/version.py tag)"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Tag mismatch: workflow was triggered by $GITHUB_REF_NAME but release metadata expects $expected_tag" >&2
            exit 1
          fi

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake binutils g++-14 pandoc

      - name: Clone jai source
        run: |
          source_ref="$(python tools/version.py source-ref)"
          git clone --depth 1 --branch "$source_ref" https://github.com/stanford-scs/jai.git jai-src

      - name: Show build environment
        run: |
          uname -a
          ldd --version | head -1
          g++-14 --version | head -1

      - name: Build portable artifacts
        run: tools/package.sh jai-src

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: jai-portable-linux-${{ matrix.asset_arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: jai-sandbox-wheel-${{ matrix.asset_arch }}
          path: py-dist/*.whl
          if-no-files-found: error
          retention-days: 14

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jai-portable-linux-*
          path: release-dist
          merge-multiple: true

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jai-sandbox-wheel-*
          path: py-dist
          merge-multiple: true

      - name: Show release files
        run: |
          find release-dist -maxdepth 1 -type f | sort
          find py-dist -maxdepth 1 -type f | sort

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-dist/* py-dist/* --clobber
          else
            gh release create "$tag" release-dist/* py-dist/* --title "$tag" --generate-notes
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: py-dist/
          skip-existing: true
